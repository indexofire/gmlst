site_name: gmlst
site_description: Fast bacterial genome typing with MLST, cgMLST, and scheme-free discovery
site_url: https://indexofire.github.io/gmlst/
repo_name: indexofire/gmlst
repo_url: https://github.com/indexofire/gmlst
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - English:
    - Getting Started:
      - Installation: en/installation.md
      - Quick Start: en/quickstart.md
      - Configuration: en/configuration.md
    - User Guide:
      - Command Reference: en/commands.md
      - Typing: en/commands/typing.md
      - Scheme: en/commands/scheme.md
      - Utils: en/commands/utils.md
      - Visual: en/commands/visual.md
      - Alignment Backends: en/backends.md
      - Data Providers: en/providers.md
      - cgMLST Guide: en/cgmlst_guide.md
      - Novel Workflow: en/novel_workflow.md
      - Visualization: en/visual_guide.md
    - FAQ: en/faq.md
    - Development:
      - Architecture: en/architecture.md
      - Contributing: en/contributing.md
  - 简体中文:
    - 快速入门:
      - 安装: zh/installation.md
      - 快速开始: zh/quickstart.md
      - 配置参考: zh/configuration.md
    - 用户指南:
      - 命令参考: zh/commands.md
      - Typing 命令: zh/commands/typing.md
      - Scheme 命令: zh/commands/scheme.md
      - Utils 命令: zh/commands/utils.md
      - Visual 命令: zh/commands/visual.md
      - 比对后端: zh/backends.md
      - 数据源: zh/providers.md
      - cgMLST 指南: zh/cgmlst_guide.md
      - Novel 工作流: zh/novel_workflow.md
      - 可视化: zh/visual_guide.md
    - FAQ: zh/faq.md
    - 开发:
      - 架构: zh/architecture.md
      - 贡献: zh/contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - exclude:
      glob:
        - internal/**
