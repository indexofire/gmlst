name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with ruff
      run: |
        ruff check gmlst/
        ruff format --check gmlst/

    - name: Test with pytest
      run: |
        pytest -v

  frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: gmlst/web/frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci
      working-directory: gmlst/web/frontend

    - name: Build frontend
      run: npm run build
      working-directory: gmlst/web/frontend

    - name: Run frontend tests
      run: npm test
      working-directory: gmlst/web/frontend

    - name: Verify static assets
      run: |
        test -f gmlst/web/static/visual/dist/app.js || (echo "app.js missing" && exit 1)
        test -f gmlst/web/static/visual/dist/app.css || (echo "app.css missing" && exit 1)

  build:
    runs-on: ubuntu-latest
    needs: [test, frontend]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: gmlst/web/frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci
      working-directory: gmlst/web/frontend

    - name: Build frontend
      run: npm run build
      working-directory: gmlst/web/frontend

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Verify wheel contains frontend assets
      run: |
        python -c "
        import zipfile, glob
        whl = glob.glob('dist/*.whl')[0]
        with zipfile.ZipFile(whl) as z:
            names = z.namelist()
            assert any('app.js' in n for n in names), 'app.js missing from wheel'
            assert any('app.css' in n for n in names), 'app.css missing from wheel'
        "

    - name: Check package
      run: twine check dist/*

  pixi:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - uses: prefix-dev/setup-pixi@v0.8

    - name: Install pixi environment
      run: pixi install

    - name: Lint and format check
      run: pixi run check

    - name: Run tests
      run: pixi run test
