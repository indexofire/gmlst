name: Publish to PyPI

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gmlst
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - uses: actions/checkout@v5

    - name: Verify version consistency
      run: |
        PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
        INIT_VERSION=$(python -c "exec(open('gmlst/__init__.py').read()); print(__version__)")
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        echo "pyproject.toml: $PYPROJECT_VERSION"
        echo "gmlst/__init__.py: $INIT_VERSION"
        echo "git tag: $TAG_VERSION"
        if [ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]; then
          echo "ERROR: pyproject.toml ($PYPROJECT_VERSION) != __init__.py ($INIT_VERSION)"
          exit 1
        fi
        if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
          echo "ERROR: pyproject.toml ($PYPROJECT_VERSION) != git tag ($TAG_VERSION)"
          exit 1
        fi
        echo "All versions match: $TAG_VERSION"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: gmlst/web/frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci
      working-directory: gmlst/web/frontend

    - name: Build frontend
      run: npm run build
      working-directory: gmlst/web/frontend

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Verify wheel contains frontend assets
      run: |
        python -c "
        import zipfile, glob
        whl = glob.glob('dist/*.whl')[0]
        with zipfile.ZipFile(whl) as z:
            names = z.namelist()
            assert any('app.js' in n for n in names), 'app.js missing from wheel'
            assert any('app.css' in n for n in names), 'app.css missing from wheel'
            assert any('catalogs' in n for n in names), 'catalog data missing from wheel'
        "

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      # No API token needed when using trusted publishing
